<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Click Rush - Dex Arcade</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <header class="game-topbar">
      <a class="back-link" href="../../">Back to arcade</a>
      <h1>Click Rush</h1>
    </header>
    <main class="game-shell">
      <section class="game-panel">
        <div class="score-row">
          <span>Score: <span id="score">0</span></span>
          <span>Time: <span id="time">20</span></span>
          <button id="start" type="button">Start</button>
        </div>
        <canvas id="game" width="400" height="400" aria-label="Click Rush game board"></canvas>
      </section>
    </main>
    <script src="./click-rush.js"></script>
  </body>
</html>
