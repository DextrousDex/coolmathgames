<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astray - Dexter Arcade</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body class="play-page">
    <div class="scene-grid" aria-hidden="true"></div>
    <header class="game-topbar">
      <a class="back-link" href="../../">Back to arcade</a>
      <h1>Astray</h1>
      <a class="source-link" href="https://github.com/wwwtyro/Astray" rel="noopener">Source</a>
    </header>
    <main class="game-shell wide-shell">
      <section class="game-panel embed-panel">
        <div class="frame-loader">
          <span class="loader-ring"></span>
          <strong>Loading Astray</strong>
          <small>WebGL maze adventure</small>
        </div>
        <iframe class="embed-frame" src="https://wwwtyro.github.io/Astray/" title="Astray" loading="eager" allow="fullscreen; gamepad" onload="this.previousElementSibling.classList.add('is-hidden')"></iframe>
      </section>
    </main>
  </body>
</html>
