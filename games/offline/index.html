<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1v1.lol - Dexter Arcade</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body class="play-page">
    <div class="scene-grid" aria-hidden="true"></div>
    <header class="game-topbar">
      <a class="back-link" href="../../#library">Back to library</a>
      <h1 id="gameTitle">1v1.lol</h1>
      <a class="source-link" id="sourceLink" href="https://github.com/CoolDude2349/Offline-HTML-Games-Pack/blob/master/offline/1v1.lol.html" rel="noopener">Source</a>
    </header>
    <main class="game-shell wide-shell">
      <section class="game-panel embed-panel">
        <div class="frame-loader" id="frameLoader">
          <span class="loader-ring"></span>
          <strong id="loaderTitle">Loading 1v1.lol</strong>
          <small id="loaderNote">Fetching offline HTML</small>
        </div>
        <iframe id="gameFrame" class="embed-frame" title="1v1.lol" loading="eager" allow="fullscreen; gamepad; pointer-lock" sandbox="allow-scripts allow-pointer-lock allow-popups allow-forms"></iframe>
      </section>
    </main>
    <script>
      const gameFile = "1v1.lol.html";
      const rawUrl = `https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/${gameFile}`;
      const sourceUrl = `https://github.com/CoolDude2349/Offline-HTML-Games-Pack/blob/master/offline/${gameFile}`;
      const frame = document.querySelector("#gameFrame");
      const loader = document.querySelector("#frameLoader");
      const note = document.querySelector("#loaderNote");
      document.querySelector("#sourceLink").href = sourceUrl;

      async function loadGame() {
        try {
          const response = await fetch(rawUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          let html = await response.text();
          const baseTag = `<base href="${rawUrl}">`;
          if (/<head[^>]*>/i.test(html)) {
            html = html.replace(/<head[^>]*>/i, (match) => `${match}${baseTag}`);
          } else {
            html = `${baseTag}${html}`;
          }
          frame.addEventListener("load", () => loader.classList.add("is-hidden"), { once: true });
          frame.srcdoc = html;
          window.setTimeout(() => loader.classList.add("is-hidden"), 1800);
        } catch (error) {
          note.innerHTML = `Could not load 1v1.lol here. <a href="${rawUrl}" rel="noopener">Open raw file</a>`;
        }
      }
      loadGame();
    </script>
  </body>
</html>
