<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dex Arcade</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Browser games</p>
        <h1>Dex Arcade</h1>
      </div>
      <label class="search">
        <span>Search</span>
        <input id="gameSearch" type="search" placeholder="Find a game" autocomplete="off" />
      </label>
    </header>

    <main>
      <section class="games-grid" id="gamesGrid" aria-label="Games">
        <a class="game-card" href="./games/snake/">
          <span class="game-art snake-art"></span>
          <strong>Snake</strong>
          <small>Classic score chase</small>
        </a>
        <a class="game-card" href="./games/click-rush/">
          <span class="game-art click-art"></span>
          <strong>Click Rush</strong>
          <small>Beat the clock</small>
        </a>
        <a class="game-card" href="./games/dodge/">
          <span class="game-art dodge-art"></span>
          <strong>Dodge</strong>
          <small>Survive the falling blocks</small>
        </a>
      </section>
    </main>

    <script src="./site.js"></script>
  </body>
</html>
